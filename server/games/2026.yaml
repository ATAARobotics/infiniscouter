name: Rebuilt
year: 2026
categories:
  data:
    name: Statbotics
    metrics:
      statbotics-year:
        order: 20
        name: Statbotics Year-Specific Data
        description: This represents all of the statbotics data specific to this year
        metric:
          type: statbotics_team
          props:
            - auto-fuel
            - teleop-fuel
            - teleop-fuel-transition
            - teleop-fuel-first-shift
            - teleop-fuel-second-shift
            - teleop-fuel-endgame
            - endgame-climb
  auto:
    name: Auto
    metrics:
      auto-score:
        order: 20
        name: Auto Score
        description: Can they score fuel in auto?
        collect: pit_only
        metric:
          type: ability
      auto-pickup:
        order: 30
        name: Auto Floor Pickup
        description: Can they pick up fuel in auto?
        collect: pit_only
        metric:
          type: ability
      auto-refill:
        order: 40
        name: Auto Outpost Refill
        description: Can they refill at the outpost in auto?
        collect: pit_only
        metric:
          type: ability
      auto-climb:
        order: 50
        name: Auto Climb
        description: Can they climb in auto?
        collect: pit_only
        metric:
          type: ability
      auto-hub:
        order: 60
        name: Auto Fuel (Scouted)
        description: Number of fuel scored in auto period.
        collect: match_pit
        metric:
          type: counter
          limit_range:
            start: 0
            end_inclusive: 100
      auto-plans:
        order: 70
        name: Auto Plans
        description: Number of auto plans available.
        collect: pit_only
        metric:
          type: counter
          limit_range:
            start: 0
            end_inclusive: 20
  teleop:
    name: Teleop
    metrics:
      fuel-score-locations:
        order: 20
        name: Fuel Score Location
        description: Where can they score from?
        collect: pit_only
        metric:
          type: enum
          options:
            - None
            - One Place
            - Multiple Fixed
            - Anywhere
      fuel-capacity:
        order: 30
        name: Fuel Capacity
        description: Approximate number of fuel they can hold at once
        collect: pit_only
        metric:
          type: counter
          limit_range:
            start: 0
            end_inclusive: 100
      fuel-pass:
        order: 40
        name: Fuel Passing
        description: Can they pass fuel from neutral zone into alliance zone?
        collect: match_pit
        metric:
          type: ability
      fuel-human-intake:
        order: 50
        name: Fuel Intake from Outpost
        description: Can they receive fuel from the outpost?
        collect: match_pit
        metric:
          type: ability
      fuel-ground-intake:
        order: 60
        name: Fuel Ground Intake
        description: Can they pick up fuel from the ground?
        collect: match_pit
        metric:
          type: ability
      teleop-hub:
        order: 60
        name: Teleop Fuel (Scouted)
        description: Number of fuel scored in teleop.
        collect: match_only
        metric:
          type: counter
          limit_range:
            start: 0
            end_inclusive: 100
  endgame:
    name: Endgame
    metrics:
      endgame-climb:
        order: 20
        name: Climb Claim
        description: What level can they reach in endgame?
        collect: pit_only
        metric:
          type: enum
          options:
            - None
            - Level 1
            - Level 2
            - Level 3
  robot:
    name: Robot
    metrics:
      april-tags:
        order: 30
        name: April Tags
        description: Can read April tags?
        collect: pit_only
        metric:
          type: ability
      under-trench:
        order: 40
        name: Under Trench
        description: Can they drive under the trench?
        collect: match_pit
        metric:
          type: ability
      over-bump:
        order: 50
        name: Over Bump
        description: Can they drive over the bump?
        collect: match_pit
        metric:
          type: ability
statbotics:
  props:
    auto-fuel:
      type: number
      property: auto_fuel
      name: "Auto Fuel"
    teleop-fuel:
      type: sum
      properties:
        - teleop_fuel
        - endgame_fuel
      name: "Teleop Fuel"
    teleop-fuel-transition:
      type: number
      property: transition_fuel
      name: "Fuel Transition"
    teleop-fuel-first-shift:
      type: number
      property: first_shift_fuel
      name: "Fuel Shift 1/2"
    teleop-fuel-second-shift:
      type: number
      property: second_shift_fuel
      name: "Fuel Shift 3/4"
    teleop-fuel-endgame:
      type: number
      property: endgame_fuel
      name: "Fuel Endgame"
    endgame-climb:
      type: number
      property: endgame_tower
      name: "Endgame Climb"
tba:
  order: 15
  props:
    auto-climb:
      type: bool
      true_value: Level1
      property: autoTowerRobot{N}
      name: "Auto Climb"
    endgame-climb:
      type: enum
      options:
        - id: None
          name: No
        - id: Level1
          name: Level 1
        - id: Level2
          name: Level 2
        - id: Level3
          name: Level 3
      property: endGameTowerRobot{N}
      name: "Endgame Climb"
ranking_points:
  - Energized RP
  - Supercharged RP
  - Traversal RP
display:
  team_row:
    - source: single
      metric: tba-auto-climb
      display: true
    - source: single
      metric: auto-climb
    - source: single
      metric: auto-plans
    - source: single
      metric: auto-hub
    - source: single
      metric: statbotics-auto-fuel
      display: true
    - source: single
      metric: fuel-score-locations
    - source: single
      metric: fuel-capacity
    - source: single
      metric: fuel-pass
    - source: single
      metric: fuel-ground-intake
    - source: single
      metric: teleop-hub
    - source: single
      metric: statbotics-teleop-fuel
      display: true
    - source: single
      metric: statbotics-teleop-fuel-transition
    - source: single
      metric: statbotics-teleop-fuel-first-shift
    - source: single
      metric: statbotics-teleop-fuel-second-shift
    - source: single
      metric: statbotics-teleop-fuel-endgame
    - source: single
      metric: endgame-climb
    - source: single
      metric: tba-endgame-climb
      display: true
    - source: single
      metric: present
      display: true
    - source: single
      metric: under-trench
    - source: single
      metric: over-bump
  pre_match:
    score: statbotics-points
    graph:
    - name: Auto
      metric: statbotics-auto-points
    - name: Teleop Fuel
      metric: statbotics-teleop-fuel
    - name: Endgame Climb
      metric: statbotics-endgame-climb
    metrics:
    - auto-plans
    - tba-auto-climb
    - statbotics-auto-fuel
    - tba-endgame-climb
    - statbotics-teleop-fuel
